name: Bump formula

# Watches upstream releases (one matrix job per formula) and opens an
# auto-merging PR when a new version ships. The PR is opened with a PAT
# (secrets.TAP_BUMP_TOKEN) on purpose: a PR opened with the default
# GITHUB_TOKEN does NOT trigger the test-bot workflow, so auto-merge would
# wait forever on a check that never runs.
#
# Arming (one-time, see CONTRIBUTING.md):
#   1. Fine-grained PAT with contents + pull-requests write on this repo,
#      stored as the TAP_BUMP_TOKEN secret.
#   2. Settings → "Allow auto-merge" enabled.
#   3. Branch protection on main requiring the test-bot checks.

on:
  schedule:
    - cron: "17 * * * *" # hourly; only acts when an upstream has a newer release
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Asset names default to the tap convention (<name>-<target>.tar.gz);
        # catenary overrides them because its release assets are bare binaries.
        # Its formula also pins an explicit `version` line (brew's URL scanner
        # reads "64" from those basenames) — bump.sh rewrites that line too.
        include:
          - formula: themis
            repo: TwoWells/Themis
          - formula: lattice
            repo: TwoWells/Lattice
          - formula: catenary
            repo: TwoWells/Catenary
            darwin_asset: catenary-macos-arm64
            linux_asset: catenary-linux-amd64
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.TAP_BUMP_TOKEN }}

      - name: Check for a new ${{ matrix.formula }} release and update the formula
        id: bump
        env:
          GH_TOKEN: ${{ secrets.TAP_BUMP_TOKEN }}
        run: >-
          ./scripts/bump.sh "${{ matrix.formula }}" "${{ matrix.repo }}"
          "${{ matrix.darwin_asset }}" "${{ matrix.linux_asset }}"

      - name: Open auto-merge PR
        if: steps.bump.outputs.BUMPED == 'true'
        env:
          GH_TOKEN: ${{ secrets.TAP_BUMP_TOKEN }}
        run: |
          version="${{ steps.bump.outputs.VERSION }}"
          branch="bump-${{ matrix.formula }}-${version}"
          git config user.name "tap-bump[bot]"
          git config user.email "bump@users.noreply.github.com"
          git switch -C "$branch"
          git commit -am "${{ matrix.formula }} ${version}"
          git push -u origin "$branch" --force
          gh pr create --base main --head "$branch" \
            --title "${{ matrix.formula }} ${version}" \
            --body "Automated bump to ${{ matrix.formula }} ${version}. Merges once \`brew test-bot\` is green on Linux and macOS."
          gh pr merge "$branch" --auto --squash
