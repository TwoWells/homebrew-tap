# Keep GitHub Actions versions current automatically. Dependabot opens a PR
# whenever an action used in .github/workflows/ publishes a new release —
# including major bumps like the Node 20 -> 24 runtime moves — so deprecations
# don't have to be chased by hand.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # One PR per week covering every actions bump, not one PR per action.
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "ci"
